{% extends "base.html" %}

{% block content %}
<div class="container py-5">

    <div class="text-center mb-5 fade-in-down">
        <h2 class="fw-bold" style="color: var(--primary-color);">
            <i class="fas fa-search me-2"></i>全站搜尋引擎
        </h2>
        <p class="text-muted">探索風格單品、尋找穿搭靈感，或是看看社群趨勢</p>

        <div class="input-group mt-4 shadow-sm rounded-pill overflow-hidden bg-white border" style="max-width: 600px; margin: 0 auto; transition: all 0.3s;">
            <span class="input-group-text bg-white border-0 ps-4"><i class="fas fa-search text-muted"></i></span>
            <input type="text" id="searchKey" class="form-control border-0 px-2 py-3"
                   placeholder="輸入關鍵字：約會、亞麻、顯瘦..."
                   style="box-shadow: none; font-size: 1.1rem;">
            <button class="btn btn-primary px-4 fw-bold" onclick="doSearch()">
                搜尋
            </button>
        </div>

        <div class="mt-4 d-flex justify-content-center gap-2 flex-wrap">
            <span class="text-muted small align-self-center me-1">熱門推薦：</span>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 hover-tag" onclick="quickSearch('面試')">#面試穿搭</button>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 hover-tag" onclick="quickSearch('約會')">#約會戰袍</button>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 hover-tag" onclick="quickSearch('顯瘦')">#顯瘦神褲</button>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 hover-tag" onclick="quickSearch('韓系')">#韓系簡約</button>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 hover-tag" onclick="quickSearch('婚禮')">#婚禮穿搭</button>
        </div>
    </div>

    <div id="loading" class="text-center d-none py-5">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3 fw-bold animate-pulse">AI 正在全網資料庫中挖掘最適合您的結果...</p>
    </div>

    <div id="resultsArea" class="fade-in-up">
        <div class="text-center text-muted py-5 opacity-50">
            <i class="fas fa-compass fa-5x mb-3"></i>
            <p>輸入關鍵字，開啟您的時尚探索之旅</p>
        </div>
    </div>
</div>

<script>
// ==========================================
// 核心搜尋邏輯
// ==========================================
function doSearch() {
    let key = document.getElementById('searchKey').value.trim();
    if (!key) return;

    // UI 狀態切換
    document.getElementById('loading').classList.remove('d-none');
    document.getElementById('resultsArea').classList.add('d-none'); // 暫時隱藏舊結果

    // 模擬稍微自然的延遲感 (0.5秒)，讓使用者感覺 AI 在運作
    setTimeout(() => {
        fetch('/api/search', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: key })
        })
        .then(r => r.json())
        .then(data => {
            renderResults(data, key);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('resultsArea').innerHTML = `
                <div class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-triangle me-2"></i> 搜尋發生錯誤，請稍後再試。
                </div>`;
        })
        .finally(() => {
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('resultsArea').classList.remove('d-none');
        });
    }, 500);
}

// ==========================================
// 渲染 HTML 結果
// ==========================================
function renderResults(data, key) {
    const area = document.getElementById('resultsArea');

    // 無結果處理
    if (data.status !== 'success' || data.count === 0) {
        area.innerHTML = `
            <div class="text-center py-5">
                <div class="mb-3 text-muted opacity-50"><i class="far fa-folder-open fa-4x"></i></div>
                <h5 class="fw-bold text-secondary">找不到與「${key}」相關的結果</h5>
                <p class="text-muted small">試試看縮短關鍵字，或是改搜尋同義詞（例如：把 "西裝" 改為 "外套"）</p>
            </div>`;
        return;
    }

    let html = '';

    // --- A. 推薦單品區塊 (Items) ---
    if (data.results.items && data.results.items.length > 0) {
        html += `
            <div class="d-flex align-items-center mb-4 mt-2">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <div>
                    <h4 class="fw-bold text-dark mb-0">精選單品</h4>
                    <small class="text-muted">找到 ${data.results.items.length} 件相關商品</small>
                </div>
            </div>

            <div class="row g-4 mb-5">`;

        data.results.items.forEach(item => {
            // 處理圖片路徑 (相容絕對路徑與相對路徑)
            let imgSrc = item.image.startsWith('http') ? item.image : `/static/${item.image}`;

            html += `
                <div class="col-6 col-md-3">
                    <div class="glass-card h-100 p-0 overflow-hidden hover-up position-relative group border-0 shadow-sm">
                        <div class="position-relative overflow-hidden">
                            <img src="${imgSrc}" class="w-100 transition-zoom" style="height: 220px; object-fit: cover;" loading="lazy">

                            <span class="position-absolute top-0 start-0 badge bg-dark bg-opacity-75 m-2 backdrop-blur small">
                                ${item.brand || '嚴選'}
                            </span>

                            <button class="btn btn-light btn-sm rounded-circle position-absolute top-0 end-0 m-2 shadow fav-btn"
                                    onclick="toggleFav(this, '${item.id}')" title="加入收藏">
                                <i class="far fa-heart text-danger"></i>
                            </button>
                        </div>
                        <div class="p-3">
                            <h6 class="fw-bold text-truncate mb-1 text-dark">${item.title}</h6>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="text-primary fw-bold">NT$ ${item.price}</span>
                                <a href="#" class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="alert('前往商品頁面: ${item.title}')">
                                    查看
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        html += `</div>`;
    }

    // --- B. 社群靈感區塊 (Posts) ---
    if (data.results.posts && data.results.posts.length > 0) {
        html += `
            <div class="d-flex align-items-center mb-4 pt-4 border-top">
                <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <h4 class="fw-bold text-dark mb-0">社群靈感</h4>
                    <small class="text-muted">來自 ${data.results.posts.length} 位穿搭達人的分享</small>
                </div>
            </div>

            <div class="row g-3">`;

        data.results.posts.forEach(post => {
            let imgSrc = post.image.startsWith('http') ? post.image : `/static/${post.image}`;

            html += `
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm h-100 overflow-hidden hover-scale rounded-4">
                        <div class="row g-0 h-100">
                            <div class="col-4 position-relative">
                                <img src="${imgSrc}" class="img-fluid h-100 w-100" style="object-fit: cover;" loading="lazy">
                            </div>
                            <div class="col-8">
                                <div class="card-body h-100 d-flex flex-column justify-content-center py-2">
                                    <div class="d-flex justify-content-between small text-muted mb-2">
                                        <span><i class="fas fa-user-circle me-1"></i>${post.author}</span>
                                        <span><i class="fas fa-heart text-danger me-1"></i>${post.likes}</span>
                                    </div>
                                    <p class="card-text text-dark fw-bold text-truncate-2 mb-0" style="line-height: 1.6; font-size: 0.95rem;">
                                        ${post.content}
                                    </p>
                                    <div class="mt-2">
                                        <span class="badge bg-light text-secondary border rounded-pill small">#穿搭</span>
                                    </div>
                                    <a href="{{ url_for('community_page') }}" class="stretched-link"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        html += `</div>`;
    }

    area.innerHTML = html;
}

// ==========================================
// 互動功能
// ==========================================

// 收藏功能 (Optimistic UI)
function toggleFav(btn, itemId) {
    const icon = btn.querySelector('i');
    const isLiked = icon.classList.contains('fas'); // 實心 = 已收藏

    // 1. 先改變 UI (讓使用者覺得很快)
    if (isLiked) {
        icon.classList.replace('fas', 'far');
    } else {
        icon.classList.replace('far', 'fas');
        // 心跳動畫
        icon.classList.add('animate__animated', 'animate__heartBeat');
        setTimeout(() => icon.classList.remove('animate__animated', 'animate__heartBeat'), 1000);
    }

    // 2. 後端請求
    fetch('/api/add_favorite', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ item_id: itemId })
    }).then(r => r.json()).then(data => {
        if(data.status !== 'success' && data.msg === 'login_required') {
            // 如果沒登入，復原狀態並提示
            if (!isLiked) icon.classList.replace('fas', 'far');
            if(confirm('請先登入才能收藏商品，是否前往登入？')) window.location.href = '/login';
        }
    });

    // 防止冒泡 (不觸發卡片點擊)
    event.stopPropagation();
}

function quickSearch(k) {
    document.getElementById('searchKey').value = k;
    doSearch();
}

// 綁定 Enter 鍵
document.getElementById('searchKey').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') doSearch();
});

// ==========================================
// [關鍵功能] 接收首頁跳轉的自動搜尋
// ==========================================
window.onload = function() {
    const autoKey = localStorage.getItem('autoSearchKey');
    if(autoKey) {
        // 自動填入並搜尋
        document.getElementById('searchKey').value = autoKey;
        doSearch();
        // 搜尋完畢後清除，避免重新整理頁面又搜一次
        localStorage.removeItem('autoSearchKey');
    }
}
</script>

<style>
    /* 動畫與特效 */
    .fade-in-down { animation: fadeInDown 0.8s ease-out; }
    .fade-in-up { animation: fadeInUp 0.8s ease-out; }

    @keyframes fadeInDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .animate-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    /* 卡片懸浮效果 */
    .hover-up { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
    .hover-up:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important; }

    .hover-scale:hover { transform: scale(1.02); transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; }

    /* 圖片放大 */
    .group:hover .transition-zoom { transform: scale(1.08); transition: transform 0.6s ease; }
    .transition-zoom { transition: transform 0.6s ease; }

    /* 標籤按鈕 */
    .hover-tag:hover {
        background-color: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
    }

    /* 多行省略 */
    .text-truncate-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .backdrop-blur { backdrop-filter: blur(4px); }
    .fav-btn:active { transform: scale(0.9); }
</style>
{% endblock %}
